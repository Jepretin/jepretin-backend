version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: jepretin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jepretin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jepretin123}
      POSTGRES_DB: jepretin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jepretin"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: jepretin-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://jepretin:${DB_PASSWORD:-jepretin123}@db:5432/jepretin
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node app.js"

volumes:
  pgdata:
